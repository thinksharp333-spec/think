<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Offline | DigiLibrary</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 20px;
        }
        .logo-box {
            width: 120px;
            height: 120px;
            background-color: #d9342a;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 10px 30px rgba(217, 52, 42, 0.3);
        }
        .logo-box img {
            width: 70px;
            height: 70px;
        }
        h1 {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        p {
            color: #888;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .btn {
            background-color: #d9342a;
            color: white;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            transition: transform 0.2s;
            cursor: pointer;
            border: none;
            width: 100%;
            font-size: 16px;
        }
        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-box">
            <!-- Fallback to a simple SVG if logo.png fails -->
            <svg viewBox="0 0 24 24" fill="white" width="60" height="60">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-4H7l5-8v4h4l-5 8z" />
            </svg>
        </div>
        <h1>You're Offline</h1>
        <p>Your connection was lost, but don't worry! You can still read the books you've downloaded.</p>
        <button class="btn" onclick="window.location.href='/dashboard'">Go to My Library</button>
    </div>
    <script>
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
